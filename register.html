<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Registration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        /* Header */
        .header {
            background-color: black;
            padding: 15px;
            text-align: center;
        }
        .header h1 {
            color: yellow;
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }
        .container {
            width: 450px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Kickstart with an exciting course</h1>
    </div>

    <div class="container">
        <form action="http://localhost:8080/courses/register" method="post">

            <label>Enter your name:</label>
            <input type="text" name="name" required>

            <label>Enter your emailId:</label>
            <input type="email" name="email" required>

            <label>Choose a Course</label>
            <select name="Coursename">
                <option value="Java Essentials">Java Essentials</option>
                <option value="Python for ML">Python Ml</option>
                <option value="Spring Boot">Spring Boot</option>
            </select>

            <button type="submit">Submit</button>

        </form>
    </div>

</body>
</html>
